{{ define "main" }}
  <main class="responsive flex min-h-[50vh] flex-col items-center justify-center py-12 sm:py-20 px-4">
    <div class="relative w-full max-w-4xl overflow-hidden rounded-xl border-1 border-foreground-primary/15 bg-background-secondary p-8 sm:p-12 shadow-xl text-left">
      <div class="pointer-events-none absolute -top-32 -right-32 h-96 w-96 rounded-full bg-accent-primary/10 blur-[80px]"></div>
      <div class="relative z-10 flex flex-col gap-10">
        <div class="flex flex-col-reverse sm:flex-row sm:items-start justify-between gap-6 w-full">
          <div class="flex flex-col gap-4 w-full">
            <div class="flex flex-col gap-1 sm:gap-1.5">
              <div class="text-foreground-secondary font-mono text-xs font-bold tracking-widest uppercase sm:text-sm" id="error-code">
                {{ with .Params.errorCode }}
                  {{ . | default "HTTP ERROR 404" }}
                {{ end }}
              </div>

              <h1 class="font-brand from-accent-strong to-accent-primary m-0 bg-linear-to-r bg-clip-text text-4xl leading-tight font-black tracking-tight text-transparent sm:text-5xl md:text-6xl wrap-break-words max-w-128" id="error-title">
                {{ .Title }}
              </h1>
            </div>

            <div class="max-w-128 text-foreground-secondary leading-relaxed" id="error-description">
              {{ .Content }}
            </div>
          </div>

          <div class="bg-background-elevated border-foreground-primary/10 relative flex h-16 w-16 sm:h-24 sm:w-24 shrink-0 items-center justify-center rounded-xl border-1 shadow-sm">
            <i class="{{ .Params.icon | default "fa-solid fa-triangle-exclamation" }} text-foreground-secondary relative z-10 text-2xl sm:text-4xl" id="error-icon"></i>
          </div>
          
        </div>

        <div class="flex w-full flex-col sm:w-auto sm:flex-row gap-3 sm:gap-4">
          <a href="/" class="btn btn-primary w-full justify-center sm:w-auto">
            <i class="fa-solid fa-house mr-1.5 text-sm opacity-80"></i> Go to Homepage
          </a>
          <button type="button" onclick="history.back()" class="btn btn-secondary w-full justify-center sm:w-auto cursor-pointer">
            <i class="fa-solid fa-arrow-left mr-1.5 text-sm opacity-80"></i> Go Back
          </button>
        </div>

      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const pawsURI = urlParams.get('pawsURI');
      const descEl = document.getElementById("error-description");

      if (descEl) {
        const pTag = descEl.querySelector('p') || descEl;
        const originalText = pTag.textContent.trim();

        if (pawsURI && originalText.includes('{url}')) {
          const parts = originalText.split('{url}');
          pTag.innerHTML = ""; 
          
          parts.forEach((part, index) => {
            pTag.appendChild(document.createTextNode(part));
            if (index < parts.length - 1) {
              const strong = document.createElement("strong");
              strong.className = "text-foreground-primary break-all";
              strong.textContent = `vulpy.link/${pawsURI}`;
              pTag.appendChild(strong);
            }
          });
        } else if (originalText.includes('{url}')) {
            pTag.innerHTML = originalText.replace('{url}', '');
        }
      }
    });
  </script>
{{ end }}
